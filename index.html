<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API-IDEE Agent - Plugin Test</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #mapjs { width: 100%; height: 100%; }
    </style>
    <!-- API-IDEE Library -->
    <link href="https://componentes.idee.es/api-idee/assets/css/apiidee.ol.min.css" rel="stylesheet" />
    <script type="text/javascript" src="https://componentes.idee.es/api-idee/vendor/browser-polyfill.js"></script>          
    <script type="text/javascript" src="https://componentes.idee.es/api-idee/js/apiidee.ol.min.js"></script>        
    <script type="text/javascript" src="https://componentes.idee.es/api-idee/js/configuration.js"></script>
    <!-- ChatAgent Plugin -->
    <link href="./plugin/chatagent.css" rel="stylesheet" />
    <script type="text/javascript" src="./plugin/chatagent.js"></script>
</head>
<body>
    <div id="mapjs"></div>

    <script>
        // Ensure IDEE is loaded before this script runs
        if (window.IDEE) {
            const map = IDEE.map({
                container: 'mapjs',
                controls: ['scale*true', 'scaleline', 'rotate', 'location', 'backgroundlayers'],
                zoom: 5,
                maxZoom: 20,
                minZoom: 4,
                center: [-467062.8225, 4983459.6216], // Example center (Spain)
            });

            const chatAgent = new IDEE.plugin.ChatAgent({
                position: 'TR', // Top-right
                collapsed: true, // Start collapsed
                backendUrl: 'http://localhost:8000/api', // URL of our Django servidor
                tooltip: 'Asistente API-IDEE',
                placeholder: 'Pregunta sobre API-IDEE...', 
                welcomeMessage: '¡Hola! Soy el asistente de API-IDEE. Pregúntame lo que quieras.'
            });

            map.addPlugin(chatAgent);
        }
    </script>
</body>
</html>
